# CI/CD Pipeline - Les Saveurs Du Jardin

name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ---------------------------------------------------------------
  # JOB 1 - PHP Tests + Security Check
  # ---------------------------------------------------------------
  tests:
    name: PHP Tests (MySQL 8.0)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: [ '8.2' ]

    services:
      database:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: lsj_db_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: app
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD_TEST }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP 8.2 with MySQL extension
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}
        extensions: mbstring, intl, pdo_mysql, zip
        coverage: xdebug

    - name: Validate composer.json and composer.lock
      run: cd symfony_project && composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: cd symfony_project && composer install --prefer-dist --no-progress

    - name: Prepare test database (MySQL)
      env:
        DATABASE_URL: "mysql://app:${{ secrets.MYSQL_PASSWORD_TEST }}@127.0.0.1:3306/lsj_db?serverVersion=8.0&charset=utf8mb4"
      run: |
        cd symfony_project
        php bin/console doctrine:database:create --env=test --if-not-exists
        php bin/console doctrine:schema:update --force --env=test

    - name: Run PHPUnit Tests
      env:
        DATABASE_URL: "mysql://app:${{ secrets.MYSQL_PASSWORD_TEST }}@127.0.0.1:3306/lsj_db?serverVersion=8.0&charset=utf8mb4"
      run: cd symfony_project && php vendor/bin/phpunit --configuration phpunit.dist.xml --testdox --stop-on-failure

    - name: Security Check - Symfony CVE Audit
      uses: symfonycorp/security-checker-action@v5
      with:
        lock: ./symfony_project/composer.lock
        disable-exit-code: true

  # ---------------------------------------------------------------
  # JOB 2 - Docker Build + Trivy Vulnerability Scan
  # ---------------------------------------------------------------
  docker-security:
    name: Docker Build, Scan and Push to GHCR
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image (production stage)
      run: docker build -f docker/Dockerfile --target prod -t lsj-app:${{ github.sha }} .

    - name: Run Trivy vulnerability scanner (CRITICAL + HIGH only)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'lsj-app:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Log in to GitHub Container Registry (GHCR)
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker image to GHCR
      if: github.ref == 'refs/heads/main'
      run: |
        # Convert repository name to lowercase for Docker tag
        REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_ID=ghcr.io/$REPO_LC/lsj-app
        
        # Tag the image
        docker tag lsj-app:${{ github.sha }} $IMAGE_ID:${{ github.sha }}
        docker tag lsj-app:${{ github.sha }} $IMAGE_ID:latest
        
        # Push both tags
        docker push $IMAGE_ID:${{ github.sha }}
        docker push $IMAGE_ID:latest

  # ---------------------------------------------------------------
  # JOB 3 - Deployment to AWS EC2 via SSH
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to AWS EC2
    needs: docker-security
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploying to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Naviguer vers le dossier du projet
          cd ~/les-saveurs-du-jardin/docker || exit
          
          # 2. Mettre à jour les fichiers de configuration
          git pull origin main
          
          # 3. Se connecter à GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 4. Télécharger la nouvelle image et redémarrer les services
          docker compose pull
          docker compose up -d
          
          # 5. Tâches de maintenance Symfony
          docker compose exec -T app php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
          docker compose exec -T app php bin/console cache:clear
          
          # 6. Nettoyage des anciennes images
          docker image prune -f
