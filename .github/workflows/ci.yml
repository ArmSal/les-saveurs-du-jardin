# 🛠️ GitHub Actions CI Pipeline - Les Saveurs Du Jardin

name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # Logic Layer (PHP)
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: [ '8.2' ]
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}
        extensions: mbstring, intl, pdo_mysql, zip
        coverage: xdebug

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run PHPUnit Tests
      run: vendor/bin/phpunit --configuration phpunit.xml.dist --testdox

    - name: Security Check (Symfony CLI)
      uses: symfonycorp/security-checker-action@v5

  # Container Layer (Docker)
  docker:
    needs: tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image (Dry Run)
      run: docker build -t lsj-web-prod .
