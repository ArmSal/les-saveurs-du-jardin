# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    documents_directory: '%kernel.project_dir%/storage/documents'
    documents_rh_directory: '%kernel.project_dir%/storage/documents_rh'
    users_directory: '%kernel.project_dir%/storage/users'
    products_directory: '%kernel.project_dir%/storage/products'
    shortcuts_directory: '%kernel.project_dir%/storage/shortcuts'
    
    # Provide a safe default so Symfony doesn't crash if the .env variable is missing
    env(GOOGLE_PLACES_API_KEY): ''
    google_places_api_key: '%env(GOOGLE_PLACES_API_KEY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Bind Google Places API key so it's auto-injected into GooglePlacesService
    App\Service\GooglePlacesService:
        arguments:
            $apiKey: '%google_places_api_key%'


