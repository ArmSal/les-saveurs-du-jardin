# =============================================================================
# ConfigMap & Secrets - Les Saveurs du Jardin
# =============================================================================
# ConfigMap : paramètres non sensibles de l'application
# Secret     : identifiants chiffrés en base64 (kubectl create secret recommandé
#              en production pour éviter de stocker les valeurs en clair)
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: lsdj-config
  namespace: lsdj
  labels:
    app.kubernetes.io/name: les-saveurs-du-jardin
data:
  MYSQL_DATABASE: "lsj_db"
  MYSQL_USER: "app"
  APP_ENV: "prod"
  APP_DEBUG: "0"
  PHP_OPCACHE_ENABLE: "1"
  PHP_MEMORY_LIMIT: "512M"

---
# Secret pour les identifiants sensibles
# En production : générer avec kubectl create secret generic lsdj-secrets \
#   --from-literal=MYSQL_ROOT_PASSWORD='<mot_de_passe>' \
#   --from-literal=MYSQL_PASSWORD='<mot_de_passe>' \
#   --namespace=lsdj
apiVersion: v1
kind: Secret
metadata:
  name: lsdj-secrets
  namespace: lsdj
  labels:
    app.kubernetes.io/name: les-saveurs-du-jardin
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "REMPLACER_MOT_DE_PASSE_ROOT"
  MYSQL_PASSWORD: "REMPLACER_MOT_DE_PASSE_APP"
  GF_SECURITY_ADMIN_PASSWORD: "REMPLACER_MOT_DE_PASSE_GRAFANA"
