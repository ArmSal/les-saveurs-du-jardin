# 🐳 Docker Compose - Les Saveurs Du Jardin (Full Stack)

services:
  # PHP-FPM Service (Application logic)
  app:
    build:
      context: .
      target: dev
    container_name: lsj-app
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lsj-network

  # Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: lsj-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - lsj-network

  # Database Service (PostgreSQL 16)
  db:
    image: postgres:16-alpine
    container_name: lsj-db
    restart: always
    environment:
      POSTGRES_DB: lsj_db
      POSTGRES_PASSWORD: root
      POSTGRES_USER: app
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d lsj_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lsj-network

  # Adminer (Database UI for dev)
  adminer:
    image: adminer
    container_name: lsj-adminer
    ports:
      - "8081:8080"
    networks:
      - lsj-network

networks:
  lsj-network:
    driver: bridge

volumes:
  db-data:
