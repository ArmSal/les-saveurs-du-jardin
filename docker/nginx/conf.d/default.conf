server {
    listen 80;
    server_name devops.armendsalihu.fr localhost;

    location /nginx_status {
        stub_status;
        access_log off;
        allow all;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name devops.armendsalihu.fr;
    root /var/www/html/public;

    ssl_certificate /etc/letsencrypt/live/devops.armendsalihu.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops.armendsalihu.fr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}
