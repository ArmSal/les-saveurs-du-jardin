# Docker Compose - Les Saveurs Du Jardin (Full Stack)

services:
  # PHP-FPM Service (Application logic)
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    container_name: lsj-app
    volumes:
      - ../symfony_project:/var/www/html
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: lsj-web
    ports:
      - "8080:80"
    volumes:
      - ../symfony_project:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app

  # Database Service (MySQL 8)
  db:
    image: mysql:8.0
    container_name: lsj-db
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: lsj-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./alertmanager/discord_webhook_url:/etc/alertmanager/discord_webhook_url:ro
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: lsj-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: lsj-grafana
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # cAdvisor - Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: lsj-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8082:8080"

  # Node Exporter - Host metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: lsj-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  # Adminer (Database UI for dev)
  adminer:
    image: adminer
    container_name: lsj-adminer
    ports:
      - "8081:8080"

  # PHP-FPM Exporter
  php-fpm-exporter:
    image: hipages/php-fpm_exporter
    container_name: lsj-php-fpm-exporter
    environment:
      - PHP_FPM_SCRAPE_URI=tcp://app:9000/status
    depends_on:
      - app

  # MySQL Exporter
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: lsj-mysqld-exporter
    volumes:
      - ./mysql/exporter.cnf:/.my.cnf:ro
    depends_on:
      - db

  # Nginx Exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: lsj-nginx-exporter
    command:
      - -nginx.scrape-uri=http://web/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - web




volumes:
  db-data:
  prometheus-data:
  grafana-data:


