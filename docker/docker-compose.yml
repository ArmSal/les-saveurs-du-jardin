# Docker Compose - Les Saveurs Du Jardin (Full Stack)

services:
  # PHP-FPM Service (Application logic)
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    container_name: lsj-app
    volumes:
      - ../symfony_project:/var/www/html
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Web Server (Nginx)
  web:
    image: nginx:1.27-alpine
    container_name: lsj-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../symfony_project:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/nginx_status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Database Service (MySQL 8)
  db:
    image: mysql:8.0
    container_name: lsj-db
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: lsj-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./alertmanager/discord_webhook_url:/etc/alertmanager/discord_webhook_url:ro
    restart: unless-stopped
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: lsj-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:11.2.2
    container_name: lsj-grafana
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # cAdvisor - Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: lsj-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8082:8080"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Node Exporter - Host metrics
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: lsj-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Adminer (Database UI for dev only)
  adminer:
    image: adminer:4.8.1
    container_name: lsj-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # PHP-FPM Exporter
  php-fpm-exporter:
    image: hipages/php-fpm_exporter:2.2
    container_name: lsj-php-fpm-exporter
    environment:
      - PHP_FPM_SCRAPE_URI=tcp://app:9000/status
    depends_on:
      - app
    networks:
      - app-network
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # MySQL Exporter
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: lsj-mysqld-exporter
    environment:
      # Identifiants injectés via variable d'environnement (pas de mot de passe en clair)
      - DATA_SOURCE_NAME=${MYSQL_EXPORTER_DSN}
    depends_on:
      - db
    networks:
      - app-network
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Nginx Exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: lsj-nginx-exporter
    command:
      - -nginx.scrape-uri=http://web/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - web
    networks:
      - app-network
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"


networks:
  app-network:
    driver: bridge
  monitoring-network:
    driver: bridge


volumes:
  db-data:
  prometheus-data:
  grafana-data:
