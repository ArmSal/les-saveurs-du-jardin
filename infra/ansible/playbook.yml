# infra/ansible/playbook.yml

---
- name: Provisionnement du Serveur LSDJ
  hosts: app
  become: yes
  
  vars:
    docker_packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release

  tasks:
    - name: Mise à jour des dépôts apt
      apt:
        update_cache: yes
        force_apt_get: yes

    - name: Installation des dépendances Docker
      apt:
        name: "{{ docker_packages }}"
        state: present

    - name: Ajout de la clé GPG officielle Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Ajout du dépôt Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Installation de Docker Engine
      apt:
        name: 
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Assurer que Docker est démarré
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ajout de l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Installation de Fail2Ban pour la sécurité
      apt:
        name: fail2ban
        state: present

    # ==========================================
    # DEPLOYMENT TASKS (BC01 / BC02)
    # ==========================================
    
    - name: Assurer que le répertoire de l'application existe
      file:
        path: /var/www/lsdj
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Clone du repository depuis GitHub
      git:
        repo: 'https://github.com/ArmSal/les-saveurs-du-jardin.git'
        dest: /var/www/lsdj
        version: main
        force: yes
      become_user: ubuntu

    - name: Login to GitHub Container Registry (GHCR)
      docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_token }}"
      become_user: ubuntu
      when: ghcr_token is defined

    - name: Déploiement de la stack via Docker Compose
      command: docker compose up -d --build
      args:
        chdir: /var/www/lsdj
      become_user: ubuntu

    - name: Exécution des migrations Doctrine
      command: docker compose exec -T app php bin/console doctrine:migrations:migrate --no-interaction
      args:
        chdir: /var/www/lsdj
      become_user: ubuntu
