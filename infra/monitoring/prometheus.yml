# infra/monitoring/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 🚨 Configuration des alertes (BC03)
rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'php-fpm'
    static_configs:
      - targets: ['app:9000'] # Nécessite un exporter PHP-FPM
